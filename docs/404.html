<script>
  // SPA fallback: redirect all 404s to index.html
  (function() {
    var path = window.location.pathname;
    if (path !== '/' && !path.match(/\.\w+$/)) {
      var xhr = new XMLHttpRequest();
      xhr.open('HEAD', path, true);
      xhr.onload = function() {
        if (xhr.status === 404) {
          window.history.replaceState(null, '', '/');
        }
      };
      xhr.send();
    }
  })();
</script>
